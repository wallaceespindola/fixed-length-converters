name: Feature Request
description: Suggest a new feature or enhancement
labels: [ enhancement ]

body:
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature you'd like
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative approaches you've considered

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - New parser library integration
        - New banking format (CODA variant, SWIFT MT variant)
        - Benchmark metrics
        - Frontend dashboard
        - REST API
        - Spring Batch pipeline
        - Documentation
        - CI/CD
