name: Bug Report
description: Report a bug or unexpected behaviour
labels: [ bug ]

body:
  - type: markdown
    attributes:
      value: "Thanks for reporting a bug. Please fill in as much detail as possible."

  - type: input
    id: version
    attributes:
      label: Application Version
      placeholder: "e.g. 1.0.0-SNAPSHOT"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear description of the bug
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Exact steps to reproduce the issue
      placeholder: |
        1. POST /api/domain/generate
        2. POST /api/batch/generate with fileType=CODA library=BEANIO
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behaviour
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Logs, stack traces, screenshots
